<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Calango - Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Variável de cor do Calango #ff6b00*/
        :root {
            --laranja-calango: hsl(20, 13%, 9%);
        }

        /* Botão customizado em laranja */
        .btn-calango {
            background-color: var(--laranja-calango);
            border: none;
            color: white;
        }

        .btn-calango:hover {
            background-color: #e05e00;
            color: white;
        }

        /* Estilização para o Mascote ficar perfeito no topo */
        .mascote-img {
            max-width: 100px;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4">

                <div class="text-center mb-2">
                    <img src="../static/images/calango.png" th:src="@{/images/calango.png}" alt="Mascote Calango"
                        class="mascote-img">
                </div>

                <h3 class="text-center fw-bold mb-3" style="color: var(--laranja-calango);">Recuperação de Senha</h3>
                <p class="text-muted text-center small">Digite seu e-mail para recuperar a senha.</p>

                <div th:if="${erro}" class="alert alert-danger small p-2" th:text="${erro}"></div>
                <div th:if="${sucesso}" class="alert alert-success small p-2" th:text="${sucesso}"></div>

                <form th:action="@{/esqueci-senha}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small">E-mail cadastrado</label>
                        <input type="email" name="email" class="form-control" required placeholder="exemplo@email.com">
                    </div>
                    <button type="submit" class="btn btn-calango w-100 fw-bold">Recuperar Senha</button>
                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/login}" class="text-decoration-none small text-muted">Voltar para o Login</a>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
