<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Administração - Calango</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --admin-purple: #7c3aed;
            --cinza-corpo: #f4f6f9;
        }

        body {
            background-color: var(--cinza-corpo);
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .main-content {
            margin-left: 240px;
            padding: 30px;
            min-height: 100vh;
            transition: margin-left 0.28s ease;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-header h3 {
            font-weight: 800;
            color: #111827;
            margin: 0;
        }

        .breadcrumb-custom {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .breadcrumb-custom a {
            color: var(--admin-purple);
            text-decoration: none;
        }

        /* TABELA */
        .table-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        .table-card .card-header {
            background: white;
            border-bottom: 1px solid #f1f5f9;
            padding: 18px 22px;
        }

        .table th {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #6b7280;
            background: #f8fafc;
            border-bottom: 1px solid #e9ecef;
            white-space: nowrap;
        }

        .table td {
            font-size: 0.86rem;
            vertical-align: middle;
            color: #374151;
        }

        .table tbody tr:hover {
            background: #faf5ff;
        }

        /* BADGES */
        .badge-status {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-ativo { background: #dcfce7; color: #15803d; }
        .status-bloqueado { background: #fee2e2; color: #dc2626; }

        /* BADGE PLANO */
        .badge-plano {
            font-size: 0.7rem;
            padding: 3px 9px;
            border-radius: 6px;
            font-weight: 600;
            background: #ede9fe;
            color: #6d28d9;
        }

        /* BOTÕES DE AÇÃO */
        .btn-acao {
            border: none;
            border-radius: 7px;
            padding: 5px 9px;
            font-size: 0.8rem;
            transition: all 0.15s;
            line-height: 1;
        }

        .btn-acao:hover {
            transform: scale(1.1);
        }

        /* SEARCH BAR */
        .search-box {
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            padding: 8px 14px;
            font-size: 0.875rem;
            width: 260px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--admin-purple);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
        }

        /* AVATAR EMPRESA */
        .company-avatar {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ALERTAS FLASH */
        .alert-flash {
            border: none;
            border-radius: 10px;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .main-content { margin-left: 0 !important; }
            .search-box { width: 100%; }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: sidebar('admin')}"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">

        <!-- BREADCRUMB -->
        <div class="breadcrumb-custom mb-1">
            <a th:href="@{/admin}"><i class="fa-solid fa-shield-halved me-1"></i>Administração</a>
            <span class="mx-1">/</span>
            <span>Clientes</span>
        </div>

        <!-- CABEÇALHO -->
        <div class="page-header">
            <div>
                <h3><i class="fa-solid fa-building me-2" style="color:#7c3aed;"></i>Gestão de Clientes</h3>
                <small class="text-muted" th:text="'Total: ' + ${clientes.size()} + ' cliente(s) cadastrado(s)'"></small>
            </div>
            <a th:href="@{/admin/clientes/novo}" class="btn text-white fw-semibold d-flex align-items-center gap-2"
               style="background:#7c3aed; border-radius:10px; padding:9px 18px;">
                <i class="fa-solid fa-plus"></i> Novo Cliente
            </a>
        </div>

        <!-- ALERTAS FLASH -->
        <div th:if="${sucesso}" class="alert alert-success alert-flash alert-dismissible fade show mb-3" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${aviso}" class="alert alert-warning alert-flash alert-dismissible fade show mb-3" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>
            <span th:text="${aviso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-flash alert-dismissible fade show mb-3" role="alert">
            <i class="fa-solid fa-circle-xmark me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- TABELA -->
        <div class="card table-card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <span class="fw-semibold text-dark">
                    <i class="fa-solid fa-list text-muted me-2"></i>Todos os Clientes
                </span>
                <input type="text" id="searchInput" class="search-box"
                       placeholder="&#xf002;  Buscar por nome ou e-mail..."
                       oninput="filtrarTabela(this.value)">
            </div>

            <div th:if="${clientes.isEmpty()}" class="text-center py-5">
                <i class="fa-solid fa-building-circle-xmark fa-3x text-muted mb-3 d-block" style="opacity:0.4;"></i>
                <p class="text-muted fw-semibold">Nenhum cliente cadastrado ainda.</p>
                <a th:href="@{/admin/clientes/novo}" class="btn btn-sm text-white" style="background:#7c3aed; border-radius:8px;">
                    <i class="fa-solid fa-plus me-1"></i> Cadastrar Primeiro Cliente
                </a>
            </div>

            <div th:if="${!clientes.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle m-0" id="tabelaClientes">
                    <thead>
                        <tr>
                            <th class="px-3 py-3">ID</th>
                            <th>Nome da Empresa</th>
                            <th>Responsável</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Plano</th>
                            <th>Status</th>
                            <th>Cadastro</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clientes}">
                            <td class="px-3 text-muted small fw-bold" th:text="'#' + ${c.id}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="company-avatar"
                                         th:text="${c.nomeEmpresa != null && !c.nomeEmpresa.isEmpty() ? c.nomeEmpresa.substring(0,1).toUpperCase() : '?'}">
                                    </div>
                                    <span class="fw-semibold text-dark" th:text="${c.nomeEmpresa}"></span>
                                </div>
                            </td>
                            <td th:text="${c.nomeResponsavel}" class="text-muted"></td>
                            <td>
                                <a th:href="'mailto:' + ${c.email}" class="text-decoration-none text-muted"
                                   th:text="${c.email}"></a>
                            </td>
                            <td th:text="${c.telefone != null ? c.telefone : '—'}" class="text-muted small"></td>
                            <td>
                                <span class="badge-plano" th:text="${c.plano != null ? c.plano : 'N/D'}"></span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${c.status == 'ATIVO'} ? 'status-ativo' : 'status-bloqueado'"
                                      th:text="${c.status}"></span>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(c.dataCadastro, 'dd/MM/yyyy')}"></td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-1 flex-wrap">
                                    <!-- Visualizar -->
                                    <a th:href="@{/admin/clientes/{id}(id=${c.id})}"
                                       class="btn btn-acao btn-light text-primary" title="Visualizar detalhes">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <!-- Editar -->
                                    <a th:href="@{/admin/clientes/{id}/editar(id=${c.id})}"
                                       class="btn btn-acao btn-light text-warning" title="Editar cliente">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </a>
                                    <!-- Ativar (se bloqueado) -->
                                    <a th:if="${c.status == 'BLOQUEADO'}"
                                       th:href="@{/admin/clientes/{id}/ativar(id=${c.id})}"
                                       class="btn btn-acao btn-light text-success" title="Ativar cliente">
                                        <i class="fa-solid fa-circle-check"></i>
                                    </a>
                                    <!-- Bloquear (se ativo) -->
                                    <a th:if="${c.status == 'ATIVO'}"
                                       th:href="@{/admin/clientes/{id}/bloquear(id=${c.id})}"
                                       class="btn btn-acao btn-light text-secondary" title="Bloquear cliente"
                                       onclick="return confirm('Bloquear o acesso deste cliente?')">
                                        <i class="fa-solid fa-ban"></i>
                                    </a>
                                    <!-- Excluir -->
                                    <a th:href="@{/admin/clientes/{id}/excluir(id=${c.id})}"
                                       class="btn btn-acao btn-light text-danger" title="Excluir cliente"
                                       onclick="return confirm('Tem certeza que deseja EXCLUIR permanentemente este cliente?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Filtro de busca em tempo real
        function filtrarTabela(termo) {
            const rows = document.querySelectorAll('#tabelaClientes tbody tr');
            const t = termo.toLowerCase().trim();
            rows.forEach(row => {
                const texto = row.textContent.toLowerCase();
                row.style.display = texto.includes(t) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
